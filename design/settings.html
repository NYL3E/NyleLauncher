<!doctype html>
<html lang="fr"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=1024"/>
<title>NyleLauncher — Settings</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css"/>
<style>body{background:#05050a}</style>
</head><body>
<section class="screen settings"><header class="topbar"><div class="topbar__left"><button class="icon-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></button><span class="brand">PARAMÈTRES</span></div><div class="topbar__right"></div></header><main class="settings__main"><section class="settings__section"><h3 class="settings__h">Mémoire</h3><p class="settings__p">Quantité de RAM allouée à Minecraft. 4 Go suffit à 95 % des joueurs.</p><div class="ram-block"><div class="ram-header"><span class="ram-current"><span class="ram-current__num">4</span><span class="ram-current__u">Go</span></span><span class="ram-max">/ 16 Go</span></div><div class="ram-track-wrap"><input type="range" min="2" max="16" value="4" class="ram-range" step="1"/><div class="ram-fill" style="width:calc((4 - 2) / 14 * 100%)"></div></div><div class="ram-scale"><span>2</span><span>4</span><span>6</span><span>8</span><span>10</span><span>12</span><span>14</span><span>16</span></div></div></section><section class="settings__section"><h3 class="settings__h">Mods optionnels</h3><p class="settings__p">Mods que tu peux activer en plus du modpack. Ils seront téléchargés au prochain lancement.</p><label class="mod-row"><div class="mod-row__info"><div class="mod-row__title">Litematica</div><div class="mod-row__desc">Prévisualisation et construction assistée par schémas.</div></div><span class="switch"><input type="checkbox"/><span class="switch__track"></span></span></label></section><section class="settings__section"><h3 class="settings__h">À propos</h3><div class="about-grid"><div><span class="micro">VERSION</span><span class="about-grid__v">0.1.0</span></div><div><span class="micro">SERVEUR</span><span class="about-grid__v">play.nylerp.fr</span></div><div><span class="micro">LOADER</span><span class="about-grid__v">Fabric 0.16.5</span></div><div><span class="micro">MC</span><span class="about-grid__v">1.21.1</span></div></div></section></main></section>
</body></html>
