name: Build launcher

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write   # create releases + upload assets

jobs:
  jar:
    name: Shaded JAR (universal)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Build shadowJar
        run: |
          chmod +x gradlew
          ./gradlew shadowJar --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: launcher-jar
          path: build/libs/nylelauncher-*.jar

  native:
    name: Native installer (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            ext: msi
          - os: macos-13
            platform: mac-intel
            ext: dmg
          - os: macos-14
            platform: mac-arm
            ext: dmg
          - os: ubuntu-latest
            platform: linux
            ext: deb
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Build shadowJar
        shell: bash
        run: |
          chmod +x gradlew || true
          ./gradlew shadowJar --no-daemon
      - name: Package with jpackage
        shell: bash
        run: |
          mkdir -p dist
          JAR=$(ls build/libs/nylelauncher-*.jar | head -1)
          VER=$(echo "$JAR" | sed -E 's/.*nylelauncher-([0-9.]+)\.jar/\1/')
          case "${{ matrix.ext }}" in
            msi) TYPE=msi ;;
            dmg) TYPE=dmg ;;
            deb) TYPE=deb ;;
          esac

          # Per-platform jpackage flags so the installer creates desktop/menu shortcuts
          # and offers a launch dialog instead of installing silently.
          EXTRA_ARGS=()
          case "${{ matrix.platform }}" in
            windows)
              # --win-shortcut         : icon on the user's desktop
              # --win-menu             : entry in the Start menu
              # --win-menu-group       : Start menu folder
              # --win-shortcut-prompt  : show the "Create desktop shortcut" checkbox
              # --win-per-user-install : install in user profile, no admin elevation needed
              # --win-dir-chooser      : let the user pick the install directory
              # --win-upgrade-uuid     : stable UUID so future versions upgrade in place
              EXTRA_ARGS+=(
                --win-shortcut
                --win-menu
                --win-menu-group "NyleRP"
                --win-shortcut-prompt
                --win-per-user-install
                --win-dir-chooser
                --win-upgrade-uuid "8c1d3a4e-9f5b-4d72-a8b6-7e5c2d1f4a93"
              )
              ;;
            linux)
              EXTRA_ARGS+=(
                --linux-shortcut
                --linux-menu-group "NyleRP"
                --linux-app-category "Game"
                --linux-deb-maintainer "lennytridat@gmail.com"
              )
              ;;
            mac-intel|mac-arm)
              EXTRA_ARGS+=(
                --mac-package-name "NyleLauncher"
              )
              ;;
          esac

          # Pick the icon for jpackage. jpackage on Windows accepts PNG since JDK 17
          # (it converts to ICO internally). We just point to the bundled app icon.
          ICON_PATH=src/main/resources/images/app_icon.png

          jpackage \
            --type "$TYPE" \
            --name NyleLauncher \
            --app-version "$VER" \
            --input build/libs \
            --main-jar "$(basename "$JAR")" \
            --main-class fr.nylerp.launcher.Main \
            --dest dist \
            --java-options "-Xmx512m" \
            --vendor "NyleRP" \
            --description "NyleRP Minecraft Launcher" \
            --copyright "NyleRP" \
            --icon "$ICON_PATH" \
            "${EXTRA_ARGS[@]}" \
            || { echo "jpackage failed"; exit 1; }
          ls -la dist/

      - name: Build portable Windows ZIP (no installer, no SmartScreen prompt)
        if: matrix.platform == 'windows'
        shell: bash
        run: |
          JAR=$(ls build/libs/nylelauncher-*.jar | head -1)
          VER=$(echo "$JAR" | sed -E 's/.*nylelauncher-([0-9.]+)\.jar/\1/')
          mkdir -p portable
          # app-image = self-contained folder with the .exe and bundled JRE.
          # No install step required: user unzips, double-clicks NyleLauncher.exe.
          jpackage \
            --type app-image \
            --name NyleLauncher \
            --app-version "$VER" \
            --input build/libs \
            --main-jar "$(basename "$JAR")" \
            --main-class fr.nylerp.launcher.Main \
            --dest portable \
            --java-options "-Xmx512m" \
            --vendor "NyleRP" \
            --description "NyleRP Minecraft Launcher" \
            --copyright "NyleRP" \
            --icon src/main/resources/images/app_icon.png

          # Drop a README inside so users know what to do.
          # Done via printf (one line per arg) because YAML heredocs break parsing.
          printf '%s\n' \
            'NyleLauncher - version portable' \
            '================================' \
            '' \
            '1. Double-clique sur NyleLauncher.exe pour lancer le launcher.' \
            '' \
            '2. Si Windows affiche "Windows a protege votre PC" :' \
            '   - Clique sur "Informations complementaires"' \
            '   - Puis sur "Executer quand meme"' \
            '   (C est normal, le launcher n est pas signe par un editeur' \
            '   Windows commercial - mais il est sur.)' \
            '' \
            '3. Connecte-toi avec ton compte Microsoft (Java officiel requis).' \
            '' \
            'Pour creer un raccourci sur ton bureau :' \
            '- Clic droit sur NyleLauncher.exe -> "Envoyer vers" -> "Bureau"' \
            '' \
            'Pour desinstaller : supprime simplement ce dossier.' \
            > portable/NyleLauncher/COMMENT_LANCER.txt

          # Zip the app-image folder using 7z (preinstalled on GH Windows runners)
          7z a -r "dist/NyleLauncher-windows-portable-${VER}.zip" "./portable/NyleLauncher" -mx=5
          ls -la dist/

      - uses: actions/upload-artifact@v4
        with:
          name: launcher-${{ matrix.platform }}
          path: dist/*

  release:
    name: Attach to Release
    needs: [ jar, native ]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/launcher-jar/*
            artifacts/launcher-windows/*
            artifacts/launcher-mac-intel/*
            artifacts/launcher-mac-arm/*
            artifacts/launcher-linux/*
