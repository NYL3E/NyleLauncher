name: Build bootstrap

# Triggered on tags like `v0.3.0` (the bootstrap version). Builds the small
# bootstrap jar and wraps it into native MSI/DMG/DEB installers — that's what
# users download once. Once installed, the bootstrap fetches the payload
# from the manifest at every launch, so future feature updates ship via
# `payload-*` tags without ever touching the bootstrap.

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  jar:
    name: Bootstrap shadowJar (universal)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'liberica'
          java-version: '21'
          java-package: 'jdk+fx'
      - name: Build bootstrap shadowJar
        run: |
          chmod +x gradlew
          ./gradlew :bootstrap:shadowJar --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: bootstrap-jar
          path: bootstrap/build/libs/nylelauncher-bootstrap-*.jar

  native:
    name: Native bootstrap installer (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            ext: msi
          - os: ubuntu-latest
            platform: linux
            ext: deb
          - os: macos-14
            platform: mac
            ext: dmg
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          # Liberica Full bundles JavaFX out of the box. Temurin doesn't, which left
          # the payload (JavaFX-based UI) crashing at QuantumRenderer init with
          # "no suitable pipeline found" once the bootstrap loaded the launcher jar.
          distribution: 'liberica'
          java-version: '21'
          java-package: 'jdk+fx'

      - name: Build bootstrap shadowJar
        shell: bash
        run: |
          chmod +x gradlew || true
          ./gradlew :bootstrap:shadowJar --no-daemon

      - name: Import Apple signing certificate (optional — needs APPLE_* secrets)
        if: matrix.platform == 'mac'
        shell: bash
        env:
          P12_B64:  ${{ secrets.APPLE_CERT_P12_BASE64 }}
          P12_PASS: ${{ secrets.APPLE_CERT_P12_PASSWORD }}
        run: |
          if [ -z "$P12_B64" ]; then
            echo "mac_sign=0" >> "$GITHUB_ENV"
            echo "ℹ️ No Apple signing secrets — the DMG will ship unsigned (Gatekeeper warning)."
            exit 0
          fi
          echo "$P12_B64" | base64 -d > /tmp/cert.p12
          security create-keychain -p ci-temp build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p ci-temp build.keychain
          security set-keychain-settings -lut 7200 build.keychain
          security import /tmp/cert.p12 -k build.keychain -P "$P12_PASS" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k ci-temp build.keychain > /dev/null
          IDENTITY=$(security find-identity -v -p codesigning build.keychain \
            | awk -F'"' '/Developer ID Application/{print $2; exit}')
          if [ -z "$IDENTITY" ]; then
            echo "::error::P12 imported but no 'Developer ID Application' identity found"
            exit 1
          fi
          echo "mac_sign=1" >> "$GITHUB_ENV"
          echo "mac_identity=$IDENTITY" >> "$GITHUB_ENV"
          rm -f /tmp/cert.p12
          echo "✅ Signing identity ready: $IDENTITY"

      - name: Package bootstrap with jpackage
        shell: bash
        run: |
          mkdir -p dist
          JAR=$(ls bootstrap/build/libs/nylelauncher-bootstrap-*.jar | head -1)
          VER="${GITHUB_REF_NAME#v}"
          case "${{ matrix.ext }}" in
            msi) TYPE=msi ;;
            deb) TYPE=deb ;;
            dmg) TYPE=dmg ;;
          esac

          # Pick the platform-appropriate icon: .ico for Windows, .icns for macOS,
          # .png for Linux. jpackage validates the extension matches the target.
          case "${{ matrix.platform }}" in
            windows) ICON=src/main/resources/images/app_icon.ico ;;
            mac)     ICON=src/main/resources/images/app_icon.icns ;;
            linux)   ICON=src/main/resources/images/app_icon.png ;;
          esac

          # macOS jpackage rejects CFBundleShortVersionString that starts with 0
          # ("The first number in an app-version cannot be zero or negative").
          # Map 0.x.y → 1.x.y on Mac only — the user-facing filename rename keeps
          # the real $VER, so SelfUpdater + site naming stay aligned across platforms.
          APP_VER="$VER"
          if [ "${{ matrix.platform }}" = "mac" ]; then
            APP_VER=$(echo "$VER" | sed -E 's/^0\./1./')
          fi
          echo "Using app-version: $APP_VER (filename version remains $VER)"

          # Use jdeps to detect every JDK module the bootstrap.jar actually needs,
          # then add:
          #   - security/locale modules that jdeps misses (loaded reflectively at
          #     runtime — TLS handshake, DNS, charsets, locale)
          #   - JavaFX modules used by the PAYLOAD that the bootstrap will load via
          #     URLClassLoader. jdeps on bootstrap.jar can't see into the payload, so
          #     we hard-code the JavaFX set. Without these the runtime image has no
          #     QuantumRenderer pipeline and the launcher UI crashes at startup.
          DEPS=$(jdeps --print-module-deps --ignore-missing-deps --multi-release 21 "$JAR")
          ALL_MODULES="${DEPS},jdk.crypto.ec,jdk.crypto.cryptoki,jdk.naming.dns,jdk.localedata,jdk.charsets,jdk.zipfs,jdk.unsupported,javafx.base,javafx.graphics,javafx.controls,javafx.fxml,javafx.media,javafx.swing,javafx.web,jdk.jfr,java.scripting,java.management"
          echo "Detected modules: $DEPS"
          echo "Final --add-modules: $ALL_MODULES"

          EXTRA_ARGS=()
          case "${{ matrix.platform }}" in
            windows)
              # GUI subsystem (no --win-console) : the black console window that
              # opened alongside the launcher scared non-technical players. JVM
              # startup diagnostics are covered by Bootstrap's crash.log — the
              # console was only ever a debugging convenience.
              #
              # --win-shortcut, --win-menu : always create both shortcuts. We use the
              # always-create flags rather than -prompt so a silent MSI upgrade still
              # places the desktop icon (the -prompt variants get hidden during major
              # upgrades, which left the user without a desktop shortcut after upgrading
              # from v0.3.5 → v0.3.8).
              EXTRA_ARGS+=(
                --win-shortcut
                --win-menu
                --win-menu-group "NyleRP"
                --win-per-user-install
                --win-upgrade-uuid "8c1d3a4e-9f5b-4d72-a8b6-7e5c2d1f4a93"
              )
              ;;
            linux)
              EXTRA_ARGS+=(
                --linux-shortcut
                --linux-menu-group "NyleRP"
                --linux-app-category "Game"
                --linux-deb-maintainer "lennytridat@gmail.com"
              )
              ;;
            mac)
              # Stable bundle id (must remain identical across versions for the
              # in-place .app replacement performed by MacUpdater to be considered
              # an upgrade by macOS Launch Services).
              EXTRA_ARGS+=(
                --mac-package-name "NyleLauncher"
                --mac-package-identifier "fr.nylerp.launcher"
              )
              # Hardened-runtime codesign during packaging when the Apple cert
              # was imported by the previous step (mac_sign=1).
              if [ "${mac_sign:-0}" = "1" ]; then
                EXTRA_ARGS+=(
                  --mac-sign
                  --mac-signing-keychain "$HOME/Library/Keychains/build.keychain-db"
                  --mac-signing-key-user-name "$mac_identity"
                )
              fi
              ;;
          esac

          # Windows: feed jpackage our full main.wxs override (forked from OpenJDK 21u
          # source) which adds a "Lancer NyleLauncher maintenant" exit-dialog checkbox.
          # Linux/Mac don't use WiX so the dir is harmless there but we only pass it on
          # Windows to avoid surprise file collisions.
          RESOURCE_ARGS=()
          if [ "${{ matrix.platform }}" = "windows" ]; then
            RESOURCE_ARGS+=(--resource-dir wix-resources)
          fi

          # --verbose surfaces candle.exe + light.exe stderr (otherwise jpackage
          # only shows the exit code, making WiX errors invisible).
          jpackage \
            --verbose \
            --type "$TYPE" \
            --name NyleLauncher \
            --app-version "$APP_VER" \
            --input bootstrap/build/libs \
            --main-jar "$(basename "$JAR")" \
            --main-class fr.nylerp.bootstrap.Bootstrap \
            --dest dist \
            --java-options "-Xmx256m" \
            --vendor "NyleRP" \
            --description "NyleRP Minecraft Launcher" \
            --copyright "NyleRP" \
            --icon "$ICON" \
            --add-modules "$ALL_MODULES" \
            "${RESOURCE_ARGS[@]}" \
            "${EXTRA_ARGS[@]}" \
            || { echo "jpackage failed"; exit 1; }

          # Rename outputs to the convention SelfUpdater + the site /api/launcher
          # functions match. Names: NyleLauncher-<platform>-v<ver>.<ext>.
          # NB: jpackage names the DMG after $APP_VER (which differs from $VER on
          # macOS due to the leading-zero workaround), so use the actual disk file.
          case "${{ matrix.platform }}" in
            windows)
              [ -f "dist/NyleLauncher-${APP_VER}.msi" ] \
                && mv "dist/NyleLauncher-${APP_VER}.msi" "dist/NyleLauncher-windows-v${VER}.msi"
              ;;
            mac)
              [ -f "dist/NyleLauncher-${APP_VER}.dmg" ] \
                && mv "dist/NyleLauncher-${APP_VER}.dmg" "dist/NyleLauncher-mac-v${VER}.dmg"
              ;;
          esac
          ls -la dist/

      - name: Notarize + staple DMG (optional — needs APPLE_* secrets)
        if: matrix.platform == 'mac'
        shell: bash
        env:
          APPLE_ID:       ${{ secrets.APPLE_DEVELOPER_ID }}
          APPLE_APP_PASS: ${{ secrets.APPLE_APP_PASSWORD }}
          TEAM_ID:        ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ "${mac_sign:-0}" != "1" ] || [ -z "$APPLE_ID" ]; then
            echo "ℹ️ Skipping notarization (no signing identity or APPLE_DEVELOPER_ID)."
            exit 0
          fi
          DMG=$(ls dist/NyleLauncher-mac-v*.dmg | head -1)
          xcrun notarytool submit "$DMG" \
            --apple-id "$APPLE_ID" --password "$APPLE_APP_PASS" --team-id "$TEAM_ID" \
            --wait --timeout 30m
          xcrun stapler staple "$DMG"
          echo "✅ DMG notarized + stapled"

      - name: Sign Windows MSI (optional — needs WINDOWS_CERT_* secrets)
        if: matrix.platform == 'windows'
        shell: pwsh
        env:
          PFX_B64:  ${{ secrets.WINDOWS_CERT_PFX_BASE64 }}
          PFX_PASS: ${{ secrets.WINDOWS_CERT_PFX_PASSWORD }}
        run: |
          if (-not $env:PFX_B64) {
            Write-Host "ℹ️ No Windows signing cert — the MSI will ship unsigned (SmartScreen warning)."
            exit 0
          }
          $pfx = Join-Path $env:RUNNER_TEMP "cert.pfx"
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:PFX_B64))
          $signtool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin\*\x64\signtool.exe" |
            Sort-Object FullName -Descending | Select-Object -First 1
          if (-not $signtool) { Write-Error "signtool.exe not found on runner"; exit 1 }
          $msi = (Get-ChildItem dist\*.msi | Select-Object -First 1).FullName
          & $signtool.FullName sign /f $pfx /p $env:PFX_PASS /fd SHA256 `
            /tr http://timestamp.digicert.com /td SHA256 /d "NyleLauncher" $msi
          if ($LASTEXITCODE -ne 0) { exit 1 }
          Remove-Item $pfx
          Write-Host "✅ MSI signed"

      - name: Build portable Windows ZIP
        if: matrix.platform == 'windows'
        shell: bash
        run: |
          JAR=$(ls bootstrap/build/libs/nylelauncher-bootstrap-*.jar | head -1)
          VER="${GITHUB_REF_NAME#v}"
          DEPS=$(jdeps --print-module-deps --ignore-missing-deps --multi-release 21 "$JAR")
          ALL_MODULES="${DEPS},jdk.crypto.ec,jdk.crypto.cryptoki,jdk.naming.dns,jdk.localedata,jdk.charsets,jdk.zipfs,jdk.unsupported,javafx.base,javafx.graphics,javafx.controls,javafx.fxml,javafx.media,javafx.swing,javafx.web,jdk.jfr,java.scripting,java.management"
          ICON=src/main/resources/images/app_icon.ico
          mkdir -p portable
          jpackage \
            --type app-image \
            --name NyleLauncher \
            --app-version "$VER" \
            --input bootstrap/build/libs \
            --main-jar "$(basename "$JAR")" \
            --main-class fr.nylerp.bootstrap.Bootstrap \
            --dest portable \
            --java-options "-Xmx256m" \
            --vendor "NyleRP" \
            --description "NyleRP Minecraft Launcher" \
            --copyright "NyleRP" \
            --icon "$ICON" \
            --add-modules "$ALL_MODULES"
          7z a -r "dist/NyleLauncher-windows-portable-v${VER}.zip" "./portable/NyleLauncher" -mx=5

      - uses: actions/upload-artifact@v4
        with:
          name: bootstrap-${{ matrix.platform }}
          path: dist/*

  release:
    name: Attach bootstrap to release
    needs: [ jar, native ]
    if: always() && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: NyleLauncher ${{ github.ref_name }}
          files: |
            artifacts/bootstrap-jar/*
            artifacts/bootstrap-windows/*
            artifacts/bootstrap-linux/*
            artifacts/bootstrap-mac/*
          body: |
            Lightweight bootstrap. **Install this once.** It fetches the actual
            launcher payload from the manifest at every launch, so all future
            updates land automatically without you needing to reinstall.
