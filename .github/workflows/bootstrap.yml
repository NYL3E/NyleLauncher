name: Build bootstrap

# Triggered on tags like `v0.3.0` (the bootstrap version). Builds the small
# bootstrap jar and wraps it into native MSI/DMG/DEB installers — that's what
# users download once. Once installed, the bootstrap fetches the payload
# from the manifest at every launch, so future feature updates ship via
# `payload-*` tags without ever touching the bootstrap.

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  jar:
    name: Bootstrap shadowJar (universal)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Build bootstrap shadowJar
        run: |
          chmod +x gradlew
          ./gradlew :bootstrap:shadowJar --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: bootstrap-jar
          path: bootstrap/build/libs/nylelauncher-bootstrap-*.jar

  native:
    name: Native bootstrap installer (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            ext: msi
          - os: ubuntu-latest
            platform: linux
            ext: deb
          - os: macos-14
            platform: mac
            ext: dmg
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build bootstrap shadowJar
        shell: bash
        run: |
          chmod +x gradlew || true
          ./gradlew :bootstrap:shadowJar --no-daemon

      - name: Package bootstrap with jpackage
        shell: bash
        run: |
          mkdir -p dist
          JAR=$(ls bootstrap/build/libs/nylelauncher-bootstrap-*.jar | head -1)
          VER="${GITHUB_REF_NAME#v}"
          case "${{ matrix.ext }}" in
            msi) TYPE=msi ;;
            deb) TYPE=deb ;;
            dmg) TYPE=dmg ;;
          esac

          # Pick the platform-appropriate icon: .ico for Windows, .icns for macOS,
          # .png for Linux. jpackage validates the extension matches the target.
          case "${{ matrix.platform }}" in
            windows) ICON=src/main/resources/images/app_icon.ico ;;
            mac)     ICON=src/main/resources/images/app_icon.icns ;;
            linux)   ICON=src/main/resources/images/app_icon.png ;;
          esac

          # macOS jpackage rejects CFBundleShortVersionString that starts with 0
          # ("The first number in an app-version cannot be zero or negative").
          # Map 0.x.y → 1.x.y on Mac only — the user-facing filename rename keeps
          # the real $VER, so SelfUpdater + site naming stay aligned across platforms.
          APP_VER="$VER"
          if [ "${{ matrix.platform }}" = "mac" ]; then
            APP_VER=$(echo "$VER" | sed -E 's/^0\./1./')
          fi
          echo "Using app-version: $APP_VER (filename version remains $VER)"

          # Use jdeps to detect every JDK module the bootstrap actually needs,
          # then add the security/locale modules that jdeps misses (loaded
          # reflectively at runtime — TLS handshake, DNS, charsets, locale).
          DEPS=$(jdeps --print-module-deps --ignore-missing-deps --multi-release 21 "$JAR")
          ALL_MODULES="${DEPS},jdk.crypto.ec,jdk.crypto.cryptoki,jdk.naming.dns,jdk.localedata,jdk.charsets,jdk.zipfs,jdk.unsupported"
          echo "Detected modules: $DEPS"
          echo "Final --add-modules: $ALL_MODULES"

          EXTRA_ARGS=()
          case "${{ matrix.platform }}" in
            windows)
              # No --win-console — the bootstrap is now stable enough that we run as a
              # proper GUI app. (With --win-console, the .exe was a console app and
              # opened a CMD window every launch displaying the bootstrap log.)
              #
              # --win-shortcut-prompt + --win-menu (no -prompt) : the install wizard
              # asks the user whether to put a shortcut on the Desktop (default checked)
              # while always installing the Start Menu entry.
              # --win-dir-chooser : add a wizard step letting the user pick the install
              # directory rather than running silently.
              EXTRA_ARGS+=(
                --win-shortcut-prompt
                --win-menu
                --win-menu-group "NyleRP"
                --win-dir-chooser
                --win-per-user-install
                --win-upgrade-uuid "8c1d3a4e-9f5b-4d72-a8b6-7e5c2d1f4a93"
              )
              ;;
            linux)
              EXTRA_ARGS+=(
                --linux-shortcut
                --linux-menu-group "NyleRP"
                --linux-app-category "Game"
                --linux-deb-maintainer "lennytridat@gmail.com"
              )
              ;;
            mac)
              # Stable bundle id (must remain identical across versions for the
              # in-place .app replacement performed by MacUpdater to be considered
              # an upgrade by macOS Launch Services).
              EXTRA_ARGS+=(
                --mac-package-name "NyleLauncher"
                --mac-package-identifier "fr.nylerp.launcher"
              )
              ;;
          esac

          jpackage \
            --type "$TYPE" \
            --name NyleLauncher \
            --app-version "$APP_VER" \
            --input bootstrap/build/libs \
            --main-jar "$(basename "$JAR")" \
            --main-class fr.nylerp.bootstrap.Bootstrap \
            --dest dist \
            --java-options "-Xmx256m" \
            --vendor "NyleRP" \
            --description "NyleRP Minecraft Launcher" \
            --copyright "NyleRP" \
            --icon "$ICON" \
            --add-modules "$ALL_MODULES" \
            "${EXTRA_ARGS[@]}" \
            || { echo "jpackage failed"; exit 1; }

          # Rename outputs to the convention SelfUpdater + the site /api/launcher
          # functions match. Names: NyleLauncher-<platform>-v<ver>.<ext>.
          # NB: jpackage names the DMG after $APP_VER (which differs from $VER on
          # macOS due to the leading-zero workaround), so use the actual disk file.
          case "${{ matrix.platform }}" in
            windows)
              [ -f "dist/NyleLauncher-${APP_VER}.msi" ] \
                && mv "dist/NyleLauncher-${APP_VER}.msi" "dist/NyleLauncher-windows-v${VER}.msi"
              ;;
            mac)
              [ -f "dist/NyleLauncher-${APP_VER}.dmg" ] \
                && mv "dist/NyleLauncher-${APP_VER}.dmg" "dist/NyleLauncher-mac-v${VER}.dmg"
              ;;
          esac
          ls -la dist/

      - name: Build portable Windows ZIP
        if: matrix.platform == 'windows'
        shell: bash
        run: |
          JAR=$(ls bootstrap/build/libs/nylelauncher-bootstrap-*.jar | head -1)
          VER="${GITHUB_REF_NAME#v}"
          DEPS=$(jdeps --print-module-deps --ignore-missing-deps --multi-release 21 "$JAR")
          ALL_MODULES="${DEPS},jdk.crypto.ec,jdk.crypto.cryptoki,jdk.naming.dns,jdk.localedata,jdk.charsets,jdk.zipfs,jdk.unsupported"
          ICON=src/main/resources/images/app_icon.ico
          mkdir -p portable
          jpackage \
            --type app-image \
            --name NyleLauncher \
            --app-version "$VER" \
            --input bootstrap/build/libs \
            --main-jar "$(basename "$JAR")" \
            --main-class fr.nylerp.bootstrap.Bootstrap \
            --dest portable \
            --java-options "-Xmx256m" \
            --vendor "NyleRP" \
            --description "NyleRP Minecraft Launcher" \
            --copyright "NyleRP" \
            --icon "$ICON" \
            --add-modules "$ALL_MODULES"
          7z a -r "dist/NyleLauncher-windows-portable-v${VER}.zip" "./portable/NyleLauncher" -mx=5

      - uses: actions/upload-artifact@v4
        with:
          name: bootstrap-${{ matrix.platform }}
          path: dist/*

  release:
    name: Attach bootstrap to release
    needs: [ jar, native ]
    if: always() && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: NyleLauncher ${{ github.ref_name }}
          files: |
            artifacts/bootstrap-jar/*
            artifacts/bootstrap-windows/*
            artifacts/bootstrap-linux/*
            artifacts/bootstrap-mac/*
          body: |
            Lightweight bootstrap. **Install this once.** It fetches the actual
            launcher payload from the manifest at every launch, so all future
            updates land automatically without you needing to reinstall.
